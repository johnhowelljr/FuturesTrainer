name: Build & Release (Windows Portable)

# Builds the self-contained Windows portable .exe with electron-builder and,
# when triggered by a version tag, publishes it as a GitHub Release.
#
#   * Push a tag like `v1.0.0`  -> builds AND creates the release with the .exe.
#   * Run manually (Actions tab) -> builds and uploads the .exe as a workflow
#     artifact only (no release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the release step can create releases / upload assets.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable (.exe)
        run: npm run portable
        env:
          # Lets electron-builder authenticate if it needs the API; the actual
          # release is published by the step below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FuturesTrainingSimulator-portable
          path: release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
