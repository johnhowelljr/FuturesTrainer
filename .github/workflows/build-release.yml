name: Build & Release (Windows Portable)

# Builds the self-contained Windows portable .exe with electron-builder, wraps it
# in a .zip (browsers/SmartScreen are far less aggressive about zipped downloads
# than a bare unsigned .exe), and publishes that zip as a GitHub Release on tags.
#
#   * Push a tag like `v1.0.0`  -> builds AND creates the release with the .zip.
#   * Run manually (Actions tab) -> builds + uploads the .zip as a workflow
#     artifact only (no release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the release step can create releases / upload assets.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable (.exe)
        # `--publish never` stops electron-builder from auto-creating its own
        # release on tagged CI builds — the "Publish GitHub Release" step below is
        # the single source of truth, so we get exactly one asset (no duplicate).
        run: npm run portable -- --publish never

      - name: Zip the portable .exe
        shell: pwsh
        # Wrap the single portable .exe in a cleanly-named zip. Users unzip, then
        # run the .exe (which is itself self-extracting — no install needed).
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $exe = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No portable .exe found in release/" }
          $zip = "release/FuturesTrainingSimulator-$ver-win-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Upload portable zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FuturesTrainingSimulator-portable-zip
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
